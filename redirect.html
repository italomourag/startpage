<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg: #e7e8eb;
            --spinner-track: #ccc;
            --spinner-color: #5294E2;
            --fade-color: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #263238;
            --spinner-track: #37474f;
            --spinner-color: #78909c;
            --fade-color: #0d0d0d;
        }
        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .loader {
            border: 6px solid var(--spinner-track);
            border-top: 6px solid var(--spinner-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);

        const isDark = saved === 'dark';
        const fadeColor = isDark ? '#0d0d0d' : '#ffffff';
        const targetUrl = new URL(window.location.href).searchParams.get('url');

        function redirectWithFade() {
            document.body.style.transition = 'background-color 0.5s ease';
            document.body.style.backgroundColor = fadeColor;
            setTimeout(() => {
                if (targetUrl) {
                    window.location.href = targetUrl;
                }
            }, 500);
        }

        if (targetUrl) {
            setTimeout(redirectWithFade, 500);
        }
    </script>
</body>
</html>
